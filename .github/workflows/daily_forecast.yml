name: Daily Forecast Full Backtest

on:
  workflow_dispatch:
    inputs:
      model:
        description: "Model to run"
        required: true
        default: "xgboost"
        type: choice
        options:
          - randomforest
          - extratrees
          - xgboost
          - lightgbm
          - catboost
          - ridge
          - elasticnet
          - ensemble

      smoke_test:
        description: "Run smoke test?"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

      smoke_test_days_per_symbol:
        description: "Smoke test days per symbol"
        required: true
        default: "3"
        type: string

      smoke_test_parameter_count:
        description: "Smoke test parameter combinations to run"
        required: true
        default: "1"
        type: string

      use_market_regime_filter:
        description: "Use market regime filter? ExtraTrees only for now"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      regime_min_ma_ratio_28:
        description: "Minimum 28d MA ratio for regime filter"
        required: true
        default: "0.98"
        type: string

      regime_min_return_20d:
        description: "Minimum 20d past return for regime filter"
        required: true
        default: "-0.08"
        type: string

      regime_max_high_low_range:
        description: "Maximum high-low range for regime filter"
        required: true
        default: "0.12"
        type: string

      log_feature_importance:
        description: "Log feature importance?"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      feature_importance_top_n:
        description: "Number of top features to log per model/date/horizon"
        required: true
        default: "50"
        type: string

      log_loss_model_importance:
        description: "Log loss-classifier feature importance?"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      exclude_raw_price_level_features:
        description: "Exclude raw price-level features?"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      exclude_features_enabled:
        description: "Use custom feature exclusions?"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

      exclude_feature_names:
        description: "Exact feature names to exclude, comma-separated"
        required: false
        default: ""
        type: string

      exclude_feature_prefixes:
        description: "Feature prefixes to exclude, comma-separated"
        required: false
        default: ""
        type: string

      exclude_feature_test_label:
        description: "Short label added to backtest_name, e.g. nostreak"
        required: false
        default: ""
        type: string

permissions:
  contents: write

concurrency:
  group: forecast-outputs
  cancel-in-progress: false

jobs:
  run-selected-model:
    runs-on: ubuntu-latest

    env:
      SMOKE_TEST: ${{ github.event.inputs.smoke_test }}
      SMOKE_TEST_DAYS_PER_SYMBOL: ${{ github.event.inputs.smoke_test_days_per_symbol }}
      SMOKE_TEST_PARAMETER_COUNT: ${{ github.event.inputs.smoke_test_parameter_count }}
      MIN_POSITIVE_PREDICTIONS: "30"

      USE_MARKET_REGIME_FILTER: ${{ github.event.inputs.use_market_regime_filter }}
      REGIME_MIN_MA_RATIO_28: ${{ github.event.inputs.regime_min_ma_ratio_28 }}
      REGIME_MIN_RETURN_20D: ${{ github.event.inputs.regime_min_return_20d }}
      REGIME_MAX_HIGH_LOW_RANGE: ${{ github.event.inputs.regime_max_high_low_range }}

      LOG_FEATURE_IMPORTANCE: ${{ github.event.inputs.log_feature_importance }}
      FEATURE_IMPORTANCE_TOP_N: ${{ github.event.inputs.feature_importance_top_n }}
      LOG_LOSS_MODEL_IMPORTANCE: ${{ github.event.inputs.log_loss_model_importance }}
      EXCLUDE_RAW_PRICE_LEVEL_FEATURES: ${{ github.event.inputs.exclude_raw_price_level_features }}

      EXCLUDE_FEATURES_ENABLED: ${{ github.event.inputs.exclude_features_enabled }}
      EXCLUDE_FEATURE_NAMES: ${{ github.event.inputs.exclude_feature_names }}
      EXCLUDE_FEATURE_PREFIXES: ${{ github.event.inputs.exclude_feature_prefixes }}
      EXCLUDE_FEATURE_TEST_LABEL: ${{ github.event.inputs.exclude_feature_test_label }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Sync latest main before run
        run: |
          git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn yfinance xgboost lightgbm catboost

      - name: Create outputs folder
        run: |
          mkdir -p outputs

      - name: Run selected model
        run: |
          MODEL="${{ github.event.inputs.model }}"

          if [ "$MODEL" = "randomforest" ]; then
            MODEL_NAME=RandomForest python src/forecast_pipeline_randomforest.py

          elif [ "$MODEL" = "extratrees" ]; then
            MODEL_NAME=ExtraTrees python src/forecast_pipeline_extratrees.py

          elif [ "$MODEL" = "xgboost" ]; then
            MODEL_NAME=XGBoost python src/forecast_pipeline_xgboost.py

          elif [ "$MODEL" = "lightgbm" ]; then
            MODEL_NAME=LightGBM python src/forecast_pipeline_lightgbm.py

          elif [ "$MODEL" = "catboost" ]; then
            MODEL_NAME=CatBoost python src/forecast_pipeline_catboost.py

          elif [ "$MODEL" = "ridge" ]; then
            MODEL_NAME=Ridge python src/forecast_pipeline_ridgeregression.py

          elif [ "$MODEL" = "elasticnet" ]; then
            MODEL_NAME=ElasticNet python src/forecast_pipeline_elasticnetlogreg.py

          elif [ "$MODEL" = "ensemble" ]; then
            python src/ensemble_backtest.py
            python src/ensemble_production.py

          else
            echo "Unknown model: $MODEL"
            exit 1
          fi

      - name: Show output files
        run: |
          echo "Outputs folder:"
          ls -lah outputs

      - name: Commit updated outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add outputs/*.csv || true

          if git diff --cached --quiet; then
            echo "No output changes to commit."
            exit 0
          fi

          git commit -m "Run full backtest: ${{ github.event.inputs.model }}"

          git fetch origin main

          if ! git rebase origin/main; then
            echo "Rebase conflict detected."
            echo "Keeping current workflow generated output files."

            for file in outputs/*.csv; do
              git checkout --theirs "$file" || true
              git add "$file" || true
            done

            GIT_EDITOR=true git rebase --continue
          fi

          git push origin HEAD:main
